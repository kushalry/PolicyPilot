services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: policypilot-postgres
    environment:
      POSTGRES_DB: policypilot
      POSTGRES_USER: pilot
      POSTGRES_PASSWORD: pilot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pilot -d policypilot"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: policypilot-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
