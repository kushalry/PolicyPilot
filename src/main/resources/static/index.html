<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PolicyPilot — AI-Powered Insurance Assistant</title>
  <style>
    :root {
      --bg: #f4f6fa;
      --card: #ffffff;
      --accent: #1f3864;
      --user: #eef3ff;
      --bot: #f7f8fb;
      --border: #e5e7eb;
      --muted: #6b7280;
    }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: var(--bg);
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .app {
      background: var(--card);
      width: 100%;
      max-width: 780px;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      height: 88vh;
    }
    header {
      background: var(--accent);
      color: white;
      padding: 18px 22px;
    }
    header h1 { margin: 0; font-size: 18px; font-weight: 600; }
    header p { margin: 4px 0 0; font-size: 12px; opacity: 0.85; }
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .msg {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: 12px;
      line-height: 1.5;
      font-size: 14.5px;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .msg.user { background: var(--user); align-self: flex-end; border: 1px solid #dbeafe; }
    .msg.bot  { background: var(--bot);  align-self: flex-start; border: 1px solid var(--border); }
    .msg .label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); margin-bottom: 4px; }
    form {
      display: flex;
      gap: 8px;
      padding: 16px;
      border-top: 1px solid var(--border);
      background: #fafafa;
    }
    input[type=text] {
      flex: 1;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 14.5px;
      outline: none;
    }
    input[type=text]:focus { border-color: var(--accent); }
    button {
      padding: 12px 20px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .cursor { display: inline-block; width: 8px; background: var(--accent); animation: blink 1s infinite; }
    @keyframes blink { 50% { opacity: 0; } }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>PolicyPilot</h1>
      <p>AI-powered assistant for your travel insurance policy · powered by Spring AI + OpenAI + pgvector</p>
    </header>
    <div id="chat"></div>
    <form id="form">
      <input id="input" type="text" placeholder="Ask about your policy…" autocomplete="off" required />
      <button id="send" type="submit">Send</button>
    </form>
  </div>

  <script>
    const chat = document.getElementById('chat');
    const form = document.getElementById('form');
    const input = document.getElementById('input');
    const send = document.getElementById('send');
    const sessionId = 'web-' + Math.random().toString(36).slice(2, 10);

    function addMsg(role, text) {
      const div = document.createElement('div');
      div.className = 'msg ' + role;
      div.innerHTML = '<div class="label">' + (role === 'user' ? 'You' : 'PolicyPilot') + '</div>';
      const span = document.createElement('span');
      span.textContent = text;
      div.appendChild(span);
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      return span;
    }

    addMsg('bot', 'Hi! Ask me anything about your travel insurance policy — coverage, exclusions, claim filing, or anything else in the document.');

    // Proper line-oriented SSE parser (W3C EventSource spec, minus the leading-space
    // stripping that mangles LLM tokens). Handles multi-line data records and skips
    // blank data lines cleanly.
    function parseSSEStream(buffer, onEvent) {
      const lines = buffer.split('\n');
      // Last element is a partial line; hold it back for the next chunk.
      const carryOver = lines.pop();

      let dataParts = [];
      for (const line of lines) {
        if (line === '') {
          // End of event: dispatch collected data lines joined by \n.
          if (dataParts.length > 0) onEvent(dataParts.join('\n'));
          dataParts = [];
        } else if (line.startsWith('data:')) {
          // Slice exactly "data:" (5 chars). Do NOT trim.
          dataParts.push(line.slice(5));
        }
        // Ignore other SSE fields (event:, id:, retry:, comments).
      }
      // Any dangling dataParts belong to an event that spans chunks — put them back
      // in the buffer along with the partial trailing line.
      const remainder = dataParts.length
        ? dataParts.map(d => 'data:' + d).join('\n') + '\n' + carryOver
        : carryOver;
      return remainder;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const question = input.value.trim();
      if (!question) return;

      addMsg('user', question);
      input.value = '';
      send.disabled = true;

      const botSpan = addMsg('bot', '');
      const cursor = document.createElement('span');
      cursor.className = 'cursor';
      cursor.textContent = ' ';
      botSpan.after(cursor);

      const url = '/api/v1/chat/stream?question=' + encodeURIComponent(question) + '&sessionId=' + sessionId;

      try {
        const resp = await fetch(url);
        const reader = resp.body.getReader();
        const decoder = new TextDecoder('utf-8');
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          buffer = parseSSEStream(buffer, (data) => {
            botSpan.textContent += data;
            chat.scrollTop = chat.scrollHeight;
          });
        }
        // Flush any final complete event held in buffer (server may not send trailing \n\n).
        if (buffer.trim().length) {
          parseSSEStream(buffer + '\n\n', (data) => {
            botSpan.textContent += data;
          });
        }
      } catch (err) {
        botSpan.textContent += '\n\n[error: ' + err.message + ']';
      } finally {
        cursor.remove();
        send.disabled = false;
        input.focus();
      }
    });

    input.focus();
  </script>
</body>
</html>
